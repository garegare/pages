  <script>
  (function () {
    var SEARCH_URL = '/pages/search.json';
    var BASE_PATH = SEARCH_URL.replace(/\/search\.json$/, ''); // "" locally, "/pages" on GitHub Pages
    var posts = null;
    var loading = false;

    var input = document.getElementById('search-input');
    var results = document.getElementById('search-results');
    if (!input || !results) return;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function loadPosts(cb) {
      if (posts !== null) { cb(); return; }
      if (loading) return;
      loading = true;
      fetch(SEARCH_URL)
        .then(function (r) { return r.json(); })
        .then(function (data) { posts = data; loading = false; cb(); })
        .catch(function () { posts = []; loading = false; cb(); });
    }

    function normalize(s) {
      return String(s).toLowerCase();
    }

    function doSearch(query) {
      var q = normalize(query.trim());
      if (!q) { results.hidden = true; return; }
      var matched = (posts || []).filter(function (p) {
        return normalize(p.title).includes(q) ||
               normalize(p.description).includes(q) ||
               normalize(p.body || '').includes(q) ||
               (Array.isArray(p.tags) && p.tags.some(function (t) { return normalize(t).includes(q); }));
      }).slice(0, 8);

      if (matched.length === 0) {
        results.innerHTML = '<li class="search-result-empty">記事が見つかりませんでした</li>';
      } else {
        results.innerHTML = matched.map(function (p) {
          var tags = Array.isArray(p.tags) && p.tags.length
            ? '<span class="search-result-tags">' + p.tags.map(escapeHtml).join(', ') + '</span>'
            : '';
          return '<li><a class="search-result-item" href="' + escapeHtml(BASE_PATH + p.url) + '">' +
            '<span class="search-result-title">' + escapeHtml(p.title) + '</span>' +
            tags +
            '</a></li>';
        }).join('');
      }
      results.hidden = false;
    }

    input.addEventListener('focus', function () {
      loadPosts(function () { doSearch(input.value); });
    });

    input.addEventListener('input', function () {
      var self = this;
      loadPosts(function () { doSearch(self.value); });
    });

    document.addEventListener('click', function (e) {
      if (!e.target.closest('.search-section')) {
        results.hidden = true;
      }
    });
  })();
  </script>
