<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="400" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="650" cy="90" r="55" fill="#fde68a" opacity="0.9"/>
  <circle cx="650" cy="90" r="42" fill="#fbbf24"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.85">
    <ellipse cx="150" cy="100" rx="70" ry="30"/>
    <ellipse cx="110" cy="108" rx="45" ry="25"/>
    <ellipse cx="195" cy="108" rx="45" ry="25"/>
    <ellipse cx="500" cy="70" rx="55" ry="24"/>
    <ellipse cx="462" cy="78" rx="36" ry="20"/>
    <ellipse cx="540" cy="78" rx="36" ry="20"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="270" width="800" height="130" fill="url(#ground)"/>

  <!-- Hills -->
  <ellipse cx="200" cy="275" rx="220" ry="80" fill="#4ade80" opacity="0.6"/>
  <ellipse cx="620" cy="280" rx="240" ry="90" fill="#22c55e" opacity="0.5"/>

  <!-- Trees (left) -->
  <g>
    <rect x="88" y="210" width="10" height="65" fill="#92400e"/>
    <polygon points="93,150 63,225 123,225" fill="#166534"/>
    <polygon points="93,175 68,235 118,235" fill="#15803d"/>
  </g>
  <g>
    <rect x="128" y="220" width="9" height="55" fill="#92400e"/>
    <polygon points="132,165 106,228 158,228" fill="#15803d"/>
    <polygon points="132,188 110,238 154,238" fill="#16a34a"/>
  </g>

  <!-- Trees (right) -->
  <g>
    <rect x="660" y="208" width="10" height="67" fill="#92400e"/>
    <polygon points="665,148 635,223 695,223" fill="#166534"/>
    <polygon points="665,173 640,233 690,233" fill="#15803d"/>
  </g>
  <g>
    <rect x="700" y="218" width="9" height="57" fill="#92400e"/>
    <polygon points="704,163 678,226 730,226" fill="#15803d"/>
    <polygon points="704,186 682,236 726,236" fill="#16a34a"/>
  </g>

  <!-- House -->
  <rect x="330" y="195" width="140" height="100" fill="#fef3c7"/>
  <rect x="330" y="195" width="140" height="100" fill="none" stroke="#d97706" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="318,198 482,198 400,135" fill="#dc2626"/>
  <polygon points="318,198 482,198 400,135" fill="none" stroke="#b91c1c" stroke-width="2"/>
  <!-- Door -->
  <rect x="378" y="245" width="44" height="50" rx="22" fill="#92400e"/>
  <circle cx="416" cy="271" r="4" fill="#fbbf24"/>
  <!-- Windows -->
  <rect x="340" y="215" width="35" height="30" rx="3" fill="#bae6fd"/>
  <rect x="340" y="215" width="35" height="30" rx="3" fill="none" stroke="#0284c7" stroke-width="1.5"/>
  <line x1="357" y1="215" x2="357" y2="245" stroke="#0284c7" stroke-width="1.5"/>
  <line x1="340" y1="230" x2="375" y2="230" stroke="#0284c7" stroke-width="1.5"/>
  <rect x="425" y="215" width="35" height="30" rx="3" fill="#bae6fd"/>
  <rect x="425" y="215" width="35" height="30" rx="3" fill="none" stroke="#0284c7" stroke-width="1.5"/>
  <line x1="442" y1="215" x2="442" y2="245" stroke="#0284c7" stroke-width="1.5"/>
  <line x1="425" y1="230" x2="460" y2="230" stroke="#0284c7" stroke-width="1.5"/>

  <!-- Path -->
  <path d="M370 295 Q380 320 355 340 Q340 355 310 370 L490 370 Q468 355 422 340 Q400 325 430 295 Z" fill="#d97706" opacity="0.6"/>

  <!-- Flowers -->
  <g>
    <circle cx="305" cy="268" r="7" fill="#f9a8d4"/>
    <circle cx="295" cy="260" r="5" fill="#f472b6"/>
    <circle cx="315" cy="260" r="5" fill="#f472b6"/>
    <line x1="305" y1="268" x2="305" y2="290" stroke="#16a34a" stroke-width="2"/>
  </g>
  <g>
    <circle cx="500" cy="265" r="7" fill="#fde68a"/>
    <circle cx="490" cy="257" r="5" fill="#fbbf24"/>
    <circle cx="510" cy="257" r="5" fill="#fbbf24"/>
    <line x1="500" y1="265" x2="500" y2="288" stroke="#16a34a" stroke-width="2"/>
  </g>

  <!-- Birds -->
  <g stroke="#374151" stroke-width="1.8" fill="none">
    <path d="M240 55 Q247 50 254 55"/>
    <path d="M260 45 Q268 40 276 45"/>
    <path d="M270 65 Q277 60 284 65"/>
  </g>

  <!-- "Hello, World!" sign -->
  <rect x="268" y="148" width="266" height="38" rx="6" fill="white" opacity="0.88"/>
  <text x="401" y="173" font-family="Georgia, serif" font-size="20" font-weight="bold"
        fill="#4f46e5" text-anchor="middle" letter-spacing="1">Hello, World! 🎉</text>
</svg>
